<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outlook • Video Call</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --red: #ff0033;
            --dark: #0a0a0a;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .scene {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
        }

        .scene.active { display: flex; }

        /* ==================== LANDING (QR) ==================== */
        #landing {
            background: linear-gradient(#1a0000, #000);
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .qr-container {
            background: #111;
            padding: 25px;
            border: 14px solid #fff;
            box-shadow: 0 0 50px var(--red);
        }

        .qr {
            width: 260px;
            height: 260px;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 3px;
            padding: 15px;
        }

        .qr-dot {
            background: #000;
        }

        .qr-dot.empty { background: transparent; }

        .scan-btn {
            margin-top: 40px;
            padding: 16px 60px;
            font-size: 1.4rem;
            background: var(--red);
            border: none;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 30px var(--red);
        }

        /* ==================== VIDEO CALL (WHATSAPP STYLE) ==================== */
        #call-screen {
            background: #111;
        }

        .call-header {
            background: #1f1f1f;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 3px solid #ff0033;
        }

        .profile {
            width: 48px;
            height: 48px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .call-info h2 {
            font-size: 1.1rem;
        }

        .call-info p {
            font-size: 0.85rem;
            color: #0f0;
        }

        .video-area {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .caller-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85);
        }

        .overlay-text {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #ff0;
            padding: 10px 25px;
            border: 3px solid #ff0033;
            font-size: 1.2rem;
            white-space: nowrap;
            opacity: 0;
            transition: 0.4s;
        }

        .call-footer {
            padding: 25px;
            display: flex;
            justify-content: space-around;
            background: #1f1f1f;
        }

        .call-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border: none;
            color: white;
        }

        .reject-btn { background: #c00; }
        .accept-btn { background: #0a0; }

        /* ==================== JUMPSCARE ==================== */
        #jumpscare {
            background: #000;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .jumpscare-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: zoomIn 1.2s ease forwards;
        }

        @keyframes zoomIn {
            0% { transform: scale(0.4); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* ==================== POSTER PAGE ==================== */
        #poster-page {
            background: #0a0000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        .poster-container {
            width: 100%;
            max-width: 720px;
            background: #111;
            padding: 20px;
            box-shadow: 0 0 60px #ff0033;
        }

        #poster-video {
            width: 100%;
            height: auto;
            border: 12px solid #222;
            box-shadow: 0 0 40px #ff0033;
        }

        .poster-text {
            text-align: center;
            margin-top: 25px;
        }

        .poster-text h1 {
            font-size: 3.2rem;
            color: #fff;
            text-shadow: 0 0 20px #ff0;
        }

        .replay-btn {
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 1.3rem;
            background: transparent;
            border: 5px solid #fff;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 1. HALAMAN QR -->
    <div id="landing" class="scene active">
        <div style="text-align:center;">
            <h1 style="font-size:2.8rem; color:#ff0033; text-shadow:0 0 20px #ff0033;">OUTLOOK</h1>
            <p style="margin:20px 0; font-size:1.1rem;">Scan untuk pengalaman eksklusif</p>
            
            <div class="qr-container">
                <div class="qr" id="qr"></div>
            </div>

            <button class="scan-btn" onclick="startCall()">MULAI VIDEO CALL</button>
        </div>
    </div>

    <!-- 2. HALAMAN VIDEO CALL (Realistis seperti WhatsApp) -->
    <div id="call-screen" class="scene">
        <div class="call-header">
            <div class="profile">👤</div>
            <div class="call-info">
                <h2>SOMI</h2>
                <p id="status">Panggilan video masuk...</p>
            </div>
        </div>

        <div class="video-area" id="video-area">
            <!-- Simulasi video orang ketakutan -->
            <div style="text-align:center; color:#fff; font-size:1.4rem; padding:40px;">
                <div style="font-size:120px; margin-bottom:20px;">😱</div>
                <p id="subtitle" class="overlay-text">Tolong... dia ada di belakangku...</p>
            </div>
        </div>

        <div class="call-footer">
            <button class="call-btn reject-btn" onclick="rejectCall()">✕</button>
            <button class="call-btn accept-btn" onclick="acceptCall()">✔</button>
        </div>
    </div>

    <!-- 3. JUMPSCARE -->
    <div id="jumpscare" class="scene">
        <img src="https://i.imgur.com/2vXz8kL.jpeg" class="jumpscare-img" alt="Jumpscare">
        <!-- Ganti dengan gambar hantu kamu sendiri jika ada -->
    </div>

    <!-- 4. HALAMAN POSTER ANIMASI -->
    <div id="poster-page" class="scene">
        <div class="poster-container">
            <video id="poster-video" controls autoplay muted loop playsinline>
                <source src="poster animasi.mp4" type="video/mp4">
                Browser kamu tidak mendukung video.
            </video>

            <div class="poster-text">
                <h1>OUTLOOK</h1>
                <p style="margin:15px 0; font-size:1.1rem;">Saksikan di KARAKTER<br>Karya Akhir Semester #7</p>
                <button class="replay-btn" onclick="replayVideo()">▶ PUTAR LAGI</button>
            </div>
        </div>
    </div>

    <script>
        let audioContext;

        function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playScream() {
            initAudio();
            const duration = 1.8;
            const bufferSize = audioContext.sampleRate * duration;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
            }

            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;

            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(2.2, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

            noise.connect(gain);
            gain.connect(audioContext.destination);
            noise.start();
        }

        function generateQR() {
            const qr = document.getElementById('qr');
            qr.innerHTML = '';
            for (let i = 0; i < 400; i++) {
                const dot = document.createElement('div');
                dot.className = 'qr-dot';
                if (Math.random() > 0.35) dot.classList.add('empty');
                qr.appendChild(dot);
            }
        }

        function showScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startCall() {
            showScene('call-screen');
        }

        function rejectCall() {
            alert("Panggilan ditolak... tapi dia masih menunggu 👀");
            showScene('landing');
        }

        function acceptCall() {
            const subtitle = document.getElementById('subtitle');
            const status = document.getElementById('status');
            
            status.textContent = "Sedang terhubung...";
            subtitle.style.opacity = "1";
            subtitle.textContent = "Tolong... dia ada di belakangku...";

            // Build-up horror
            setTimeout(() => {
                subtitle.textContent = "Lihat ke belakang...";
            }, 2500);

            setTimeout(() => {
                document.getElementById('video-area').style.animation = 'shake 0.4s infinite';
            }, 4500);

            // Jumpscare setelah ±7 detik
            setTimeout(() => {
                playScream();
                showScene('jumpscare');

                setTimeout(() => {
                    showScene('poster-page');
                    const video = document.getElementById('poster-video');
                    video.muted = false;   // boleh di-unmute setelah jumpscare
                    video.play().catch(() => {});
                }, 1600);
            }, 7200);
        }

        function replayVideo() {
            const video = document.getElementById('poster-video');
            video.currentTime = 0;
            video.play();
        }

        // Inisialisasi
        window.onload = () => {
            generateQR();
            console.log("%cWebsite Horror Outlook siap! Jangan sendirian ya...", "color:#ff0033; font-size:14px");
        };
    </script>
</body>
</html>
